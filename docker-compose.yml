# Local development / preview. Production stays on Cloudflare Workers.
# From docker-vm (shared folder):
#   cd /mnt/projects/projects/pocket-ledger
#   docker compose up
#
# Dev:     http://localhost:5173  (or the VM host IP if port-forwarded)
# Preview: docker compose --profile preview up preview

services:
  dev:
    build: .
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    # Named volume starts empty — install into it before Vite.
    command:
      - sh
      - -c
      - npm ci && npm run dev -- --host 0.0.0.0 --port 5173

  preview:
    profiles: ['preview']
    build: .
    ports:
      - '4173:4173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command:
      - sh
      - -c
      - npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 4173

volumes:
  node_modules:
